<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>空间语音聊天室</title>
<style>
:root {
  --bg: #0f0f11; --card: #1a1a1f; --text: #e4e4e7;
  --text2: #71717a; --accent: #22c55e; --danger: #ef4444;
  --muted: #f59e0b; --border: rgba(255,255,255,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
  background: var(--bg); color: var(--text);
  height: 100dvh; height: 100vh;
  display: flex; justify-content: center;
  -webkit-font-smoothing: antialiased; overflow: hidden;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
}
.app {
  width: 100%; max-width: 520px; height: 100%;
  display: flex; flex-direction: column; padding: 8px; gap: 6px;
}

/* ── Header ── */
.header { text-align: center; padding: 2px 0; flex-shrink: 0; }
.header h1 { font-size: 16px; font-weight: 590; letter-spacing: -0.02em; margin: 0; }
.header .status { font-size: 11px; color: var(--text2); margin-top: 2px; }
.status.online { color: var(--accent); }
.status.error { color: var(--danger); }
.room-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(34,197,94,0.1); color: var(--accent);
  padding: 3px 10px; border-radius: 16px; font-size: 11px; font-weight: 510;
}
.room-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

/* ── Map ── */
.map-wrap {
  flex: 1; min-height: 120px;
  background: var(--card); border-radius: 14px;
  border: 1px solid var(--border); overflow: hidden; position: relative;
}
.map-wrap canvas { display: block; width: 100%; height: 100%; cursor: grab; }
.map-wrap canvas:active { cursor: grabbing; }
.map-hint {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: var(--text2); opacity: 0.6;
  pointer-events: none;
}

/* ── Self card ── */
.self-row {
  background: var(--card); border-radius: 14px;
  padding: 8px 14px; display: flex; align-items: center; gap: 10px;
  border: 1px solid var(--border); flex-shrink: 0;
}
.self-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.self-info { flex: 1; }
.self-name { font-size: 14px; font-weight: 590; }
.self-mic { font-size: 11px; }
.self-mic.on { color: var(--accent); }
.self-mic.off { color: var(--danger); }
.ctrl-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  font-size: 15px; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn.mic { background: rgba(34,197,94,0.12); color: var(--accent); }
.ctrl-btn.mic.off { background: rgba(239,68,68,0.12); color: var(--danger); }
.ctrl-btn.leave { background: rgba(239,68,68,0.1); color: var(--danger); }

/* ── Join bar ── */
.join-bar {
  display: flex; gap: 8px; padding: 8px 14px;
  background: var(--card); border-radius: 14px;
  border: 1px solid var(--border); flex-shrink: 0;
}
.join-bar input {
  flex: 1; border: none; background: transparent;
  color: var(--text); font: 14px -apple-system, sans-serif;
  outline: none; letter-spacing: -0.01em;
}
.join-bar input::placeholder { color: var(--text2); }
.join-bar button {
  padding: 7px 16px; border-radius: 9px; border: none;
  background: var(--accent); color: #000; font-weight: 590;
  font: 13px -apple-system, sans-serif; cursor: pointer;
}
.join-bar button:disabled { opacity: 0.4; }

/* ── Spatial mode selector ── */
.spatial-select {
  display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap;
}
.spatial-select button {
  flex: 1; min-width: 48px; padding: 5px 8px; border-radius: 7px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text2); font: 10px -apple-system, sans-serif;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.spatial-select button.active {
  background: rgba(34,197,94,0.12); color: var(--accent);
  border-color: rgba(34,197,94,0.3);
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>🗺️ 空间语音聊天室 <span style="font-size:10px;color:var(--accent);background:rgba(34,197,94,0.1);padding:2px 6px;border-radius:8px">v22</span></h1>
    <div id="status-line"><span class="status" id="status">输入房间名加入</span></div>
  </div>

  <div class="map-wrap" id="map-wrap">
    <canvas id="map"></canvas>
    <div class="map-hint">拖拽自己移动 · 距离越近声音越大 · 左右声道分离</div>
  </div>

  <div class="spatial-select" id="spatial-select">
    <button data-mode="hrtf" class="active">真实</button>
    <button data-mode="equal">均衡</button>
    <button data-mode="stereo">声像</button>
    <button data-mode="hybrid">混合</button>
    <button data-mode="custom">手动</button>
    <button data-mode="test">🔊测试</button>
  </div>

  <div class="self-row" id="self-row" style="display:none">
    <div class="self-avatar" id="self-color">🎙️</div>
    <div class="self-info">
      <div class="self-name" id="self-name">我</div>
      <div class="self-mic on" id="self-mic">麦克风已开启</div>
    </div>
    <button class="ctrl-btn mic" id="btn-mic">🎤</button>
    <button class="ctrl-btn leave" id="btn-leave">🚪</button>
  </div>

  <div class="join-bar" id="join-bar">
    <input id="room-input" placeholder="输入房间名..." autofocus>
    <button id="btn-join">加入</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.3/dist/mqtt.min.js"></script>
<script>
// ═══════ 空间语音聊天室 ═══════
// P2P 音频 (PeerJS) + 房间发现 (MQTT) + 空间音频 (Web Audio PannerNode)
// 拖拽角色移动 → 距离衰减 → 左右声道分离

const MQTT_URL = 'wss://broker.emqx.io:8084/mqtt';
const PEER_CONFIG = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
const ROOM_SIZE = 800; // 房间尺寸 (px) — 对应虚拟空间 20m×20m
const POS_INTERVAL = 0; // 位置广播间隔 (0=每帧)
const COLORS = ['#4f46e5','#7c3aed','#db2777','#ea580c','#16a34a','#0891b2','#ca8a04',
  '#9333ea','#e11d48','#65a30d','#0d9488','#b45309','#1d4ed8','#2563eb'];

let peer = null, mqttClient = null, localStream = null;
let audioCtx = null;  // 一个共享 AudioContext
let micOn = true, myPeerId = null, currentRoom = null;
const peers = new Map(); // peerId → { call, stream, source, panner, x, y, color }

// ═══════ Canvas 地图 ═══════
const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
let myPos = { x: ROOM_SIZE/2, y: ROOM_SIZE/2 };
let dragging = false, dragTarget = null;

function resizeCanvas() {
  const wrap = document.getElementById('map-wrap');
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resizeCanvas();
// drawMap() called below after pingRipple declaration
window.addEventListener('resize', () => { resizeCanvas(); drawMap(); });

function pxToWorld(cx, cy) {
  return {
    x: (cx / canvas.width * devicePixelRatio) * ROOM_SIZE,
    y: (cy / canvas.height * devicePixelRatio) * ROOM_SIZE
  };
}

let pingRipple = null;
drawMap();  // 初始空房间
// 首次触摸屏幕时唤醒蓝牙音频路由 (iOS 需要用户手势)
let _wakeOnce = false;
document.addEventListener('pointerdown', () => {
  if (_wakeOnce) return; _wakeOnce = true;
  const ctx = new AudioContext();
  const o = ctx.createOscillator(), g = ctx.createGain();
  g.gain.value = 0.001; o.type = 'sine'; o.frequency.value = 1000;
  o.connect(g); g.connect(ctx.destination);
  o.start(); setTimeout(() => { o.stop(); ctx.close(); }, 150);
}, { once: true });

function drawMap() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  // 背景装饰点
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 137 + 50) % w;
    const sy = (i * 251 + 80) % h;
    ctx.beginPath(); ctx.arc(sx, sy, 2, 0, Math.PI * 2); ctx.fill();
  }

  // 网格
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  const gs = 40;
  for (let x = gs; x < w; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = gs; y < h; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

  // 其他人
  for (const [pid, p] of peers) {
    const px = (p.x / ROOM_SIZE) * w;
    const py = (p.y / ROOM_SIZE) * h;
    drawAvatar(px, py, p.color || '#888', pid.slice(-6), false);
  }

  // 自己
  const mx = (myPos.x / ROOM_SIZE) * w;
  const my = (myPos.y / ROOM_SIZE) * h;
  drawAvatar(mx, my, '#22c55e', '我', true);

  // Ping 波纹
  if (pingRipple) {
    const now = Date.now();
    const elapsed = (now - pingRipple.t) / 1000;
    if (elapsed < 1.2) {
      const r = 14 + elapsed * 60;
      const alpha = 1 - elapsed / 1.2;
      ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(pingRipple.x, pingRipple.y, r, 0, Math.PI * 2); ctx.stroke();
      requestAnimationFrame(() => { drawMap(); });
    } else {
      pingRipple = null;
    }
  }
}

function drawAvatar(x, y, color, label, isSelf) {
  const r = isSelf ? 16 : 14;
  // 光晕
  const glow = ctx.createRadialGradient(x, y, r * 0.5, x, y, r * 2);
  glow.addColorStop(0, color + '40');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(x, y, r * 2, 0, Math.PI * 2); ctx.fill();
  // 身体
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  // 标签
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y - r - 8);
}

function findClosestPeer(mx, my) {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  let best = null, bestDist = 30; // 30px 内才算点中
  for (const [pid, p] of peers) {
    const px = (p.x / ROOM_SIZE) * w;
    const py = (p.y / ROOM_SIZE) * h;
    const dist = Math.hypot(mx - px, my - py);
    if (dist < bestDist) { bestDist = dist; best = pid; }
  }
  return best;
}

// ── 拖拽/触摸 ──
canvas.addEventListener('pointerdown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const target = findClosestPeer(mx, my);
  if (target === null) {
    // 点空地 → 移动自己
    dragging = true; dragTarget = 'self';
    const pos = pxToWorld(mx, my);
    myPos.x = Math.max(10, Math.min(ROOM_SIZE - 10, pos.x));
    myPos.y = Math.max(10, Math.min(ROOM_SIZE - 10, pos.y));
    broadcastPosition();
    updateSpatialAudio();
    drawMap();
  } else if (e.detail === 2) {
    // 双击别人 → ping
    const p = peers.get(target);
    const w = canvas.width / devicePixelRatio;
    const px = (p.x / ROOM_SIZE) * w;
    const py = (p.y / ROOM_SIZE) * h;
    pingRipple = { x: px, y: py, t: Date.now() };
    drawMap();
    // 发送 ping
    mqttClient.publish('voice-room/' + currentRoom + '/ping', JSON.stringify({
      from: myPeerId, to: target
    }));
  }
});
canvas.addEventListener('pointermove', (e) => {
  if (!dragging || dragTarget !== 'self') return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const pos = pxToWorld(mx, my);
  myPos.x = Math.max(10, Math.min(ROOM_SIZE - 10, pos.x));
  myPos.y = Math.max(10, Math.min(ROOM_SIZE - 10, pos.y));
  broadcastPosition();
  updateSpatialAudio();
  drawMap();
});
canvas.addEventListener('pointerup', () => { dragging = false; dragTarget = null; });
canvas.addEventListener('pointerleave', () => { dragging = false; dragTarget = null; });

// 键盘 WASD
document.addEventListener('keydown', (e) => {
  if (!currentRoom) return;
  const step = 20;
  switch (e.key.toLowerCase()) {
    case 'w': case 'arrowup': myPos.y -= step; break;
    case 's': case 'arrowdown': myPos.y += step; break;
    case 'a': case 'arrowleft': myPos.x -= step; break;
    case 'd': case 'arrowright': myPos.x += step; break;
    default: return;
  }
  myPos.x = Math.max(10, Math.min(ROOM_SIZE - 10, myPos.x));
  myPos.y = Math.max(10, Math.min(ROOM_SIZE - 10, myPos.y));
  broadcastPosition();
  updateSpatialAudio();
  drawMap();
});

let lastPosBroadcast = 0;
function broadcastPosition() {
  const now = Date.now();
  if (now - lastPosBroadcast < POS_INTERVAL) return;
  lastPosBroadcast = now;
  if (mqttClient && currentRoom) {
    mqttClient.publish('voice-room/' + currentRoom + '/pos', JSON.stringify({
      peerId: myPeerId, x: myPos.x, y: myPos.y
    }));
  }
}

// ═══════ 空间音频 · 5+1 算法 ═══════
let spatialMode = 'hrtf', duckingOn = true;
const DUCK_RATIO = 0.3;
let testOscL = null, testOscR = null, testGainL = null, testGainR = null, testMerger = null, testTimer = null;

function startStereoTest() {
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (testOscL) return;

  testMerger = audioCtx.createChannelMerger(2);
  testGainL = audioCtx.createGain(); testGainL.gain.value = 0.12;
  testGainR = audioCtx.createGain(); testGainR.gain.value = 0.12;
  testOscL = audioCtx.createOscillator(); testOscL.type = 'sine'; testOscL.frequency.value = 440;
  testOscR = audioCtx.createOscillator(); testOscR.type = 'sine'; testOscR.frequency.value = 660;

  testOscL.connect(testGainL); testGainL.connect(testMerger, 0, 0); // 左声道 440Hz
  testOscR.connect(testGainR); testGainR.connect(testMerger, 0, 1); // 右声道 660Hz
  testMerger.connect(audioCtx.destination);
  testOscL.start(); testOscR.start();

  // 轮流: 两耳→只左→两耳→只右
  let step = 0;
  testTimer = setInterval(() => {
    step = (step + 1) % 4;
    testGainL.gain.value = (step === 1) ? 0 : 0.12;
    testGainR.gain.value = (step === 3) ? 0 : 0.12;
  }, 2000);
}

function stopStereoTest() {
  if (testTimer) { clearInterval(testTimer); testTimer = null; }
  [testOscL,testOscR].forEach(o => { if(o){try{o.stop();o.disconnect()}catch(e){}} });
  [testGainL,testGainR,testMerger].forEach(n => { if(n){try{n.disconnect()}catch(e){}} });
  testOscL = testOscR = testGainL = testGainR = testMerger = null;
}

// ── 自动避让 (Ducking) ──
let duckTimer = null;
function startDucking() {
  if (duckTimer) return;
  duckTimer = setInterval(() => {
    if (!duckingOn) return;
    let loudest = null, loudestVol = 0;
    // 找最响的人
    for (const [pid, p] of peers) {
      const vol = p.smoothedVol || 0;
      if (vol > loudestVol) { loudestVol = vol; loudest = p; }
    }
    // 最响的人满音量, 其余人压到 DUCK_RATIO
    for (const [pid, p] of peers) {
      if (!p.gainNode) continue;
      const target = (p === loudest && loudestVol > 10) ? 1.0 : DUCK_RATIO;
      // 平滑过渡避免爆音
      const cur = p.gainNode.gain.value;
      p.gainNode.gain.value = cur + (target - cur) * 0.2;
    }
  }, 100);
}
function stopDucking() {
  if (duckTimer) { clearInterval(duckTimer); duckTimer = null; }
}

function reconnectPanner(p) {
  // 恢复默认链路: stereoPan → panner → gainNode
  try { p.stereoPan.disconnect(); } catch(e) {}
  try { p.panner.disconnect(); } catch(e) {}
  p.stereoPan.connect(p.panner);
  p.panner.connect(p.gainNode);
  p._stereoBypass = false;
}

function updateSpatialAudio() {
  if (!audioCtx) return;
  const listener = audioCtx.listener;
  const sx = (myPos.x / ROOM_SIZE) * 20 - 10;
  const sy = 0;
  const sz = (myPos.y / ROOM_SIZE) * 20 - 10;
  if (listener.positionX) {
    listener.positionX.value = sx;
    listener.positionY.value = sy;
    listener.positionZ.value = sz;
  } else {
    listener.setPosition(sx, sy, sz);
  }

  for (const [pid, p] of peers) {
    if (!p.gainNode) continue;

    const tx = (p.x / ROOM_SIZE) * 20 - 10; // -10m ~ +10m
    const tz = (p.y / ROOM_SIZE) * 20 - 10;
    const dx = tx - sx; // 相对于我的 X
    const dz = tz - sz; // 相对于我的 Z (前后)
    const distM = Math.sqrt(dx*dx + dz*dz);
    const angle = Math.atan2(dx, Math.abs(dz) + 0.01); // 水平角

    // 距离衰减: inverse-square + 钳位
    const refDist = 2;
    const maxDist = 18;
    const distGain = Math.max(0, Math.min(1, refDist / Math.max(refDist, distM)));
    // 前后衰减: 背后声音闷一点 (HRTF 模拟)
    const frontBackGain = dz >= 0 ? 1.0 : 0.7; // 前面正常, 后面 -30%

    // 设置 PannerNode 位置
    if (p.panner) {
      if (p.panner.positionX) {
        p.panner.positionX.value = tx;
        p.panner.positionZ.value = tz;
      } else {
        p.panner.setPosition(tx, 0, tz);
      }
    }

    // 根据模式更新各节点
    switch (spatialMode) {
      case 'hrtf':
        if (p._stereoBypass) { reconnectPanner(p); }
        p.panner && (p.panner.panningModel = 'HRTF');
        p.stereoPan && (p.stereoPan.pan.value = 0);
        p.gainNode.gain.value = 1;
        break;
      case 'equal':
        if (p._stereoBypass) { reconnectPanner(p); }
        p.panner && (p.panner.panningModel = 'equalpower');
        p.stereoPan && (p.stereoPan.pan.value = 0);
        p.gainNode.gain.value = 1;
        break;
      case 'stereo':
        // 绕过 PannerNode: 手动距离增益 + 纯 Stereo 左右
        p.panner && p.panner.positionX && (p.panner.positionX.value = sx);
        p.panner && p.panner.positionZ && (p.panner.positionZ.value = sz);
        p.stereoPan && (p.stereoPan.pan.value = Math.tanh(Math.sin(angle) * 2.5));
        p.gainNode.gain.value = distGain * frontBackGain;
        // 关键: 把 PannerNode 输出掐掉, 让 stereoPan 直连 gainNode
        if (!p._stereoBypass) {
          try { p.panner.disconnect(); } catch(e) {}
          try { p.stereoPan.disconnect(); } catch(e) {}
          try { p.stereoPan.connect(p.gainNode); } catch(e) {}
          p._stereoBypass = true;
        }
        break;
      case 'hybrid':
        if (p._stereoBypass) { reconnectPanner(p); }
        p.panner && (p.panner.panningModel = 'HRTF');
        p.stereoPan && (p.stereoPan.pan.value = Math.tanh(Math.sin(angle) * 1.5));
        p.gainNode.gain.value = 1;
        break;
      case 'custom':
        // 绕过 PannerNode: 纯手动左右+距离+前后
        p.panner && p.panner.positionX && (p.panner.positionX.value = sx);
        p.panner && p.panner.positionZ && (p.panner.positionZ.value = sz);
        p.stereoPan && (p.stereoPan.pan.value = Math.tanh(Math.sin(angle) * 3.0));
        p.gainNode.gain.value = distGain * frontBackGain;
        if (!p._stereoBypass) {
          try { p.panner.disconnect(); } catch(e) {}
          try { p.stereoPan.disconnect(); } catch(e) {}
          try { p.stereoPan.connect(p.gainNode); } catch(e) {}
          p._stereoBypass = true;
        }
        break;
    }
  }
}

let posTimer = null;

// ═══════ 加入/离开 ═══════
async function joinRoom() {
  const room = $('room-input').value.trim();
  if (!room || currentRoom) return;
  currentRoom = room;

  setStatus('正在连接...');
  $('btn-join').disabled = true;

  // 先创建 AudioContext 抢占立体声管线 (在 getUserMedia 切通话模式之前)
  if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 48000 });
  if (audioCtx.state === 'suspended') audioCtx.resume();

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: { ideal: 2 }, echoCancellation: false, autoGainControl: false, noiseSuppression: false, sampleRate: 48000 } });
  } catch (e) {
    setStatus('麦克风权限被拒绝', true);
    $('btn-join').disabled = false; currentRoom = null;
    return;
  }

  // AudioContext (用户手势期间创建, 规避 iOS 限制)
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  // MQTT 房间发现
  mqttClient = mqtt.connect(MQTT_URL, { clean: true, connectTimeout: 8000, reconnectPeriod: 0 });
  mqttClient.on('connect', () => {
    mqttClient.subscribe('voice-room/' + room + '/#');
  });
  mqttClient.on('error', (e) => { console.error('MQTT error', e); setStatus('信令不可达 · 刷新重试', true); });

  // PeerJS
  const peerId = 'vr-' + room + '-' + Math.random().toString(36).slice(2, 8);
  myPeerId = peerId;
  peer = new Peer(peerId, { config: PEER_CONFIG });

  peer.on('open', () => {
    showSelf(room);
    setStatus('', false, true, room);
    startDucking();
    mqttClient.publish('voice-room/' + room + '/announce', JSON.stringify({
      peerId, x: myPos.x, y: myPos.y
    }));
    // 定时广播位置
    posTimer = setInterval(broadcastPosition, POS_INTERVAL);
  });

  peer.on('error', (e) => { setStatus('连接失败: ' + e.type, true); leaveRoom(); });

  peer.on('call', (call) => {
    call.answer(getActiveStream());
    setupCall(call);
  });

  // 收到他人的 announcement → 回拨
  mqttClient.on('message', (topic, msg) => {
    const parts = topic.split('/');
    const type = parts[parts.length - 1];
    if (type === 'announce') {
      const data = JSON.parse(msg.toString());
      if (data.peerId === myPeerId) return;
      if (!data.x) data.x = ROOM_SIZE/2; if (!data.y) data.y = ROOM_SIZE/2;
      // 如果已有这个 peer（呼叫先于 announce 到达）→ 只更新位置
      if (peers.has(data.peerId)) {
        const p = peers.get(data.peerId);
        p.x = data.x; p.y = data.y;
        updateSpatialAudio(); drawMap();
        return;
      }
      // 新 peer → 呼叫 + 存储
      const call = peer.call(data.peerId, getActiveStream());
      const info = {};
      info.x = data.x; info.y = data.y;
      peers.set(data.peerId, info);
      setupCall(call);
      drawMap();
    } else if (type === 'pos') {
      const data = JSON.parse(msg.toString());
      const p = peers.get(data.peerId);
      if (p) { p.x = data.x; p.y = data.y; updateSpatialAudio(); drawMap(); }
    } else if (type === 'ping') {
      const data = JSON.parse(msg.toString());
      if (data.to === myPeerId) {
        const p = peers.get(data.from);
        if (p) {
          const w = canvas.width / devicePixelRatio;
          const px = (p.x / ROOM_SIZE) * w;
          const py = (p.y / ROOM_SIZE) * h;
          pingRipple = { x: px, y: py, t: Date.now() };
          drawMap();
        }
      }
    }
  });

  // 初始随机位置
  myPos.x = 100 + Math.random() * (ROOM_SIZE - 200);
  myPos.y = 100 + Math.random() * (ROOM_SIZE - 200);
  drawMap();
}

function setupCall(call) {
  const pid = call.peer;
  if (peers.has(pid)) {
    if (peers.get(pid).stream) return; // 已经 setup 过了
  }

  const info = peers.get(pid) || { x: ROOM_SIZE/2, y: ROOM_SIZE/2 };
  info.call = call;
  info.color = COLORS[peers.size % COLORS.length];

  call.on('stream', (remoteStream) => {
    // 空间音频链路: stream → source → panner → destination
    const source = audioCtx.createMediaStreamSource(remoteStream);
    const stereoPan = audioCtx.createStereoPanner();
    const panner = audioCtx.createPanner();
    const gainNode = audioCtx.createGain();
    panner.panningModel = 'HRTF';
    panner.distanceModel = 'inverse';
    panner.refDistance = 2;
    panner.maxDistance = 18;
    panner.rolloffFactor = 1.5;
    // 链路: source → stereoPan → panner → gainNode → destination
    source.connect(stereoPan);
    stereoPan.connect(panner);
    panner.connect(gainNode);
    // gainNode → volAnalyser → destination (加一路分析器)
    const volAnalyser = audioCtx.createAnalyser();
    volAnalyser.fftSize = 256;
    gainNode.connect(volAnalyser);
    volAnalyser.connect(audioCtx.destination);

    info.stream = remoteStream;
    info.source = source;
    info.stereoPan = stereoPan;
    info.panner = panner;
    info.gainNode = gainNode;
    info.smoothedVol = 0;
    info._volBuf = new Uint8Array(volAnalyser.frequencyBinCount);
    const volTick = () => {
      if (!peers.has(pid)) return;
      volAnalyser.getByteFrequencyData(info._volBuf);
      const avg = info._volBuf.reduce((a,b)=>a+b,0) / info._volBuf.length;
      info.smoothedVol = info.smoothedVol * 0.6 + avg * 0.4;
      requestAnimationFrame(volTick);
    };
    volTick();
    peers.set(pid, info);
    updateSpatialAudio();
    drawMap();
  });

  call.on('close', () => removePeer(pid));
  call.on('error', () => removePeer(pid));
  peers.set(pid, info);
}

function removePeer(pid) {
  const p = peers.get(pid);
  if (p) {
    try { p.source?.disconnect(); } catch(e) {}
    try { p.stereoPan?.disconnect(); } catch(e) {}
    try { p.panner?.disconnect(); } catch(e) {}
    try { p.gainNode?.disconnect(); } catch(e) {}
    try { p.call?.close(); } catch(e) {}
    peers.delete(pid);
  }
  drawMap();
}

function updateSpatialAudioNow() { updateSpatialAudio(); drawMap(); }

// ═══════ UI ═══════
function $(s) { return document.getElementById(s); }

function showSelf(room) {
  $('self-row').style.display = 'flex';
  // spatial-select 始终可见
  $('self-color').style.background = '#22c55e';
  $('self-name').textContent = '我 (' + myPeerId.slice(-6) + ')';
}

// ── 持久无声流 (仅创建一次) ──
let silentStream = null;
function getSilentStream() {
  if (silentStream) return silentStream;
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  const dst = ctx.createMediaStreamDestination();
  osc.type = 'sine'; osc.frequency.value = 440;
  osc.connect(dst); osc.start(); // 持续运行
  silentStream = dst.stream;
  return silentStream;
}
function getActiveStream() {
  return localStream || getSilentStream();
}

// ── 替换所有 PeerJS 连接中的音频轨 ──
function replaceAllTracks(newStream) {
  const track = newStream.getAudioTracks()[0];
  if (!track) return;
  for (const [pid, p] of peers) {
    if (p.call && p.call.peerConnection) {
      p.call.peerConnection.getSenders().forEach(s => {
        if (s.track?.kind === 'audio') { try { s.replaceTrack(track); } catch(e) {} }
      });
    }
  }
}

// ── 推讲: 关麦 → 释放 getUserMedia → 立体声恢复 ──
function stopMicForStereo() {
  if (!localStream) return;
  // 先替换所有发送轨为无声流
  replaceAllTracks(getSilentStream());
  // 停止真麦
  localStream.getTracks().forEach(t => t.stop());
  localStream = null;
  // 蓝牙唤醒
  if (audioCtx) {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    g.gain.value = 0.001; o.type = 'sine'; o.frequency.value = 1000;
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); setTimeout(() => { try { o.stop(); o.disconnect(); g.disconnect(); } catch(e) {} }, 100);
  }
  updateMicUI(false);
}

// ── 推讲: 开麦 → 恢复 getUserMedia → 可以说话 ──
async function startMicForTalk() {
  if (localStream) return;
  localStream = await navigator.mediaDevices.getUserMedia({
    audio: { channelCount: { ideal: 2 }, echoCancellation: false, autoGainControl: false, noiseSuppression: false, sampleRate: 48000 }
  });
  replaceAllTracks(localStream);
  updateMicUI(true);
}

function toggleMic() {
  if (localStream) { stopMicForStereo(); } else { startMicForTalk(); }
}

function updateMicUI(micOn) {
  const btn = $('btn-mic'), label = $('self-mic');
  btn.classList.toggle('off', !micOn); btn.textContent = micOn ? '🎤' : '🔇';
  label.className = 'self-mic ' + (micOn ? 'on' : 'off');
  label.textContent = micOn ? '说话中 · 单声道' : '收听中 · 立体声';
}

function setStatus(text, isError, isOnline, room) {
  const el = $('status');
  el.className = 'status' + (isError ? ' error' : '') + (isOnline ? ' online' : '');
  if (room) {
    const count = peers.size + 1; // +1 = 自己
    el.innerHTML = '<span class="room-badge"><span class="dot"></span>' + room + ' · ' + count + '人</span> ' + text;
  } else {
    el.textContent = text;
  }
}

function leaveRoom() {
  for (const [, p] of peers) {
    try { p.source?.disconnect(); } catch(e) {}
    try { p.stereoPan?.disconnect(); } catch(e) {}
    try { p.panner?.disconnect(); } catch(e) {}
    try { p.gainNode?.disconnect(); } catch(e) {}
    try { p.call?.close(); } catch(e) {}
  }
  peers.clear();
  if (peer) { peer.destroy(); peer = null; }
  if (mqttClient) { try { mqttClient.end(); } catch(e) {} mqttClient = null; }
  stopDucking();
  if (posTimer) { clearInterval(posTimer); posTimer = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  myPeerId = null; currentRoom = null; micOn = true; myPos = { x: ROOM_SIZE/2, y: ROOM_SIZE/2 };

  $('self-row').style.display = 'none';
  // 始终可见
  $('self-name').textContent = '我';
  $('self-mic').className = 'self-mic on'; $('self-mic').textContent = '麦克风已开启';
  $('btn-mic').classList.remove('off'); $('btn-mic').textContent = '🎤';
  $('btn-join').disabled = false;
  setStatus('输入房间名加入');
  drawMap();
}

// ── 空间算法切换 ──
document.querySelectorAll('.spatial-select button').forEach(btn => {
  btn.addEventListener('click', () => {
    stopStereoTest();
    spatialMode = btn.dataset.mode;
    document.querySelectorAll('.spatial-select button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (spatialMode === 'test') { startStereoTest(); }
    else updateSpatialAudio();
  });
});

// ═══════ 事件 ═══════
$('btn-join').addEventListener('click', joinRoom);
$('btn-mic').addEventListener('click', toggleMic);
$('btn-leave').addEventListener('click', () => { if (confirm('退出房间？')) leaveRoom(); });
$('room-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom();
});
</script>
