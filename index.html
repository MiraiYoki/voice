<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>语音聊天室</title>
<style>
:root {
  --bg: #0f0f11; --card: #1a1a1f; --text: #e4e4e7;
  --text2: #71717a; --accent: #22c55e; --danger: #ef4444;
  --muted: #f59e0b; --border: rgba(255,255,255,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
  background: var(--bg); color: var(--text);
  height: 100dvh; display: flex; justify-content: center;
  -webkit-font-smoothing: antialiased; overflow: hidden;
}
.app {
  width: 100%; max-width: 520px; height: 100dvh;
  display: flex; flex-direction: column; padding: 20px; gap: 14px;
}

/* ── Header ── */
.header { text-align: center; padding: 6px 0; }
.header h1 { font-size: 20px; font-weight: 590; letter-spacing: -0.02em; }
.header .status { font-size: 12px; color: var(--text2); margin-top: 4px; }
.status.online { color: var(--accent); }
.status.error { color: var(--danger); }

/* ── Room badge ── */
.room-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(34,197,94,0.1); color: var(--accent);
  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 510;
}
.room-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

/* ── Self card ── */
.self-card {
  background: var(--card); border-radius: 14px;
  padding: 16px; display: flex; align-items: center; gap: 12px;
  border: 1px solid var(--border);
}
.self-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.self-info { flex: 1; }
.self-name { font-size: 15px; font-weight: 590; }
.self-mic { font-size: 12px; }
.self-mic.on { color: var(--accent); }
.self-mic.off { color: var(--danger); }

.controls { display: flex; gap: 6px; }
.ctrl-btn {
  width: 38px; height: 38px; border-radius: 50%; border: none;
  font-size: 16px; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn.mic { background: rgba(34,197,94,0.12); color: var(--accent); }
.ctrl-btn.mic.off { background: rgba(239,68,68,0.12); color: var(--danger); }
.ctrl-btn.leave { background: rgba(239,68,68,0.1); color: var(--danger); }

/* ── Peers ── */
.peers { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.peer-card {
  background: var(--card); border-radius: 14px;
  padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  border: 1px solid var(--border);
  animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.peer-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.peer-info { flex: 1; }
.peer-name { font-size: 14px; font-weight: 510; }
.peer-status { font-size: 11px; color: var(--text2); }
.peer-status.speaking { color: var(--accent); }

.volume-bar {
  width: 4px; height: 22px; background: rgba(34,197,94,0.15);
  border-radius: 2px; overflow: hidden; flex-shrink: 0;
}
.volume-fill { width: 100%; background: var(--accent); transition: height 0.08s; }

.empty {
  flex: 1; display: flex; align-items: center; justify-content: center;
  color: var(--text2); font-size: 13px; text-align: center; line-height: 1.6;
}

/* ── Join bar ── */
.join-bar {
  display: flex; gap: 8px;
  padding: 12px; background: var(--card); border-radius: 14px;
  border: 1px solid var(--border);
}
.join-bar input {
  flex: 1; border: none; background: transparent;
  color: var(--text); font: 14px -apple-system, sans-serif;
  outline: none; letter-spacing: -0.01em;
}
.join-bar input::placeholder { color: var(--text2); }
.join-bar button {
  padding: 8px 18px; border-radius: 10px; border: none;
  background: var(--accent); color: #000; font-weight: 590;
  font: 13px -apple-system, sans-serif; cursor: pointer;
}
.join-bar button:disabled { opacity: 0.4; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>语音聊天室</h1>
    <div id="status-line" style="margin-top:4px">
      <span class="status" id="status">输入房间名加入</span>
    </div>
  </div>

  <div class="self-card" id="self-card" style="display:none">
    <div class="self-avatar">🎙️</div>
    <div class="self-info">
      <div class="self-name" id="self-name">我</div>
      <div class="self-mic on" id="self-mic">麦克风已开启</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn mic" id="btn-mic">🎤</button>
      <button class="ctrl-btn leave" id="btn-leave">🚪</button>
    </div>
  </div>

  <div class="peers" id="peers">
    <div class="empty" id="empty">输入房间名加入语音聊天<br>最多 7 人 · 端到端加密</div>
  </div>

  <div class="join-bar" id="join-bar">
    <input id="room-input" placeholder="输入房间名..." autofocus>
    <button id="btn-join">加入</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.3/dist/mqtt.min.js"></script>
<script>
// ═══════ 信令层: EMQX 公共 MQTT (房间发现) + PeerJS (P2P 音频) ═══════

// 检查依赖是否加载
window.addEventListener('error', function(e) {
  if (e.target && e.target.tagName === 'SCRIPT') {
    document.getElementById('status').textContent = 'CDN 加载失败 · 请检查网络';
    document.getElementById('status').className = 'status error';
  }
});

setTimeout(function() {
  if (typeof Peer === 'undefined' || typeof mqtt === 'undefined') {
    document.getElementById('status').textContent = '依赖加载失败 · 刷新重试';
    document.getElementById('status').className = 'status error';
  }
}, 3000);

const MQTT_URL = 'wss://broker.emqx.io:8084/mqtt';
const PEER_CONFIG = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

let peer = null;        // PeerJS 实例
let mqttClient = null;  // MQTT 客户端 (仅房间发现)
let localStream = null;
let micOn = true;
let myPeerId = null;
let currentRoom = null;
const peers = new Map(); // peerId → { pc, mediaConnection, stream, analyser }
const COLORS = ['#4f46e5','#7c3aed','#db2777','#ea580c','#16a34a','#0891b2','#ca8a04',
  '#2563eb','#9333ea','#e11d48','#65a30d','#0d9488','#b45309','#1d4ed8'];

function $(s) { return document.getElementById(s); }

// ═══════ 加入房间 ═══════
async function joinRoom() {
  const room = $('room-input').value.trim();
  if (!room || currentRoom) return;
  currentRoom = room;

  setStatus('正在连接...');
  $('btn-join').disabled = true;

  // 1. 获取麦克风
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    setStatus('麦克风权限被拒绝', true);
    $('btn-join').disabled = false;
    currentRoom = null;
    return;
  }

  // 2. 连接 MQTT (房间发现)
  try {
    mqttClient = mqtt.connect(MQTT_URL, { clean: true, connectTimeout: 8000, reconnectPeriod: 0 });
  } catch(e) {
    setStatus('MQTT 连接失败: ' + e.message, true);
    leaveRoom();
    return;
  }
  let mqttReady = false;
  mqttClient.on('connect', () => {
    mqttReady = true;
    mqttClient.subscribe('voice-room/' + room + '/#');
  });
  mqttClient.on('error', (e) => {
    console.error('MQTT error:', e);
    setStatus('信令服务器不可达 · 刷新重试', true);
  });
  mqttClient.on('close', () => {
    if (!mqttReady) setStatus('信令连接超时 · 刷新重试', true);
  });

  // 3. 初始化 PeerJS (P2P 音频)
  const peerId = 'vr-' + room + '-' + Math.random().toString(36).slice(2, 8);
  peer = new Peer(peerId, { config: PEER_CONFIG });
  myPeerId = peerId;

  peer.on('open', () => {
    showSelf(room);
    setStatus('', false, true, room);
    // 向房间广播自己的 PeerJS ID
    mqttClient.publish('voice-room/' + room + '/announce', peerId);
  });

  peer.on('error', (e) => {
    setStatus('连接失败: ' + e.type, true);
    leaveRoom();
  });

  // 有人打电话给我 → 接听
  peer.on('call', (call) => {
    call.answer(localStream);
    setupCall(call);
  });

  // 4. 收到别人的 PeerJS ID → 打过去
  mqttClient.on('message', (topic, message) => {
    const remoteId = message.toString();
    if (remoteId === myPeerId) return;        // 自己的消息, 忽略
    if (peers.has(remoteId)) return;           // 已经连着了
    const call = peer.call(remoteId, localStream);
    setupCall(call);
  });
}

// ═══════ WebRTC 通话 ═══════
function setupCall(call) {
  const pid = call.peer;
  if (peers.has(pid)) {
    try { peers.get(pid).mediaConnection.close(); } catch(e) {}
  }

  call.on('stream', (remoteStream) => {
    const audio = new Audio();
    audio.srcObject = remoteStream;
    audio.autoplay = true;
    audio.play().catch(() => {});

    const data = { mediaConnection: call, stream: remoteStream, analyser: null };
    peers.set(pid, data);
    addPeerCard(pid);
    setupVolumeMeter(pid, remoteStream, data);
  });

  call.on('close', () => removePeer(pid));
  call.on('error', () => removePeer(pid));
}

// ═══════ 音量检测 ═══════
function setupVolumeMeter(pid, stream, data) {
  const ctx = new AudioContext();
  const src = ctx.createMediaStreamSource(stream);
  const analyser = ctx.createAnalyser();
  analyser.fftSize = 256;
  src.connect(analyser);
  data.analyser = analyser;

  const buf = new Uint8Array(analyser.frequencyBinCount);
  const tick = () => {
    if (!peers.has(pid)) return;
    analyser.getByteFrequencyData(buf);
    const avg = buf.reduce((a, b) => a + b, 0) / buf.length;
    const pct = Math.min(100, Math.round((avg / 128) * 100));
    const fill = document.getElementById('vol-' + pid);
    const status = document.getElementById('st-' + pid);
    if (fill) fill.style.height = pct + '%';
    if (status) {
      status.className = 'peer-status' + (avg > 12 ? ' speaking' : '');
      status.textContent = avg > 12 ? '正在说话' : '在线';
    }
    requestAnimationFrame(tick);
  };
  tick();
}

// ═══════ UI ═══════
function showSelf(room) {
  $('self-card').style.display = 'flex';
  $('empty').style.display = 'none';
  $('self-name').textContent = '我 (' + myPeerId.slice(-6) + ')';
}

function addPeerCard(pid) {
  if (document.getElementById('peer-' + pid)) return;
  $('empty').style.display = 'none';
  const color = COLORS[peers.size % COLORS.length];
  const card = document.createElement('div');
  card.className = 'peer-card';
  card.id = 'peer-' + pid;
  card.innerHTML = `
    <div class="peer-avatar" style="background:${color}">👤</div>
    <div class="peer-info">
      <div class="peer-name">${pid.slice(-10)}</div>
      <div class="peer-status" id="st-${pid}">在线</div>
    </div>
    <div class="volume-bar"><div class="volume-fill" id="vol-${pid}" style="height:0%"></div></div>
  `;
  $('peers').appendChild(card);
}

function removePeer(pid) {
  const p = peers.get(pid);
  if (p) { try { p.mediaConnection.close(); } catch(e) {} peers.delete(pid); }
  const card = document.getElementById('peer-' + pid);
  if (card) card.remove();
  if (peers.size === 0) $('empty').style.display = '';
}

function toggleMic() {
  if (!localStream) return;
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  const btn = $('btn-mic'), label = $('self-mic');
  btn.classList.toggle('off', !micOn); btn.textContent = micOn ? '🎤' : '🔇';
  label.className = 'self-mic ' + (micOn ? 'on' : 'off');
  label.textContent = micOn ? '麦克风已开启' : '已静音';
}

function setStatus(text, isError, isOnline, room) {
  const el = $('status');
  el.className = 'status' + (isError ? ' error' : '') + (isOnline ? ' online' : '');
  if (room) {
    el.innerHTML = '<span class="room-badge"><span class="dot"></span>' + room + '</span> ' + text;
  } else {
    el.textContent = text;
  }
}

function leaveRoom() {
  for (const [, p] of peers) try { p.mediaConnection.close(); } catch(e) {}
  peers.clear();
  if (peer) { peer.destroy(); peer = null; }
  if (mqttClient) { try { mqttClient.end(); } catch(e) {} mqttClient = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  myPeerId = null;
  currentRoom = null;

  document.querySelectorAll('.peer-card').forEach(c => c.remove());
  $('self-card').style.display = 'none';
  $('empty').style.display = '';
  $('self-name').textContent = '我';
  $('self-mic').className = 'self-mic on';
  $('self-mic').textContent = '麦克风已开启';
  $('btn-mic').classList.remove('off'); $('btn-mic').textContent = '🎤';
  $('btn-join').disabled = false;
  micOn = true;
  setStatus('输入房间名加入');
}

// ═══════ 事件 ═══════
$('btn-join').addEventListener('click', joinRoom);
$('btn-mic').addEventListener('click', toggleMic);
$('btn-leave').addEventListener('click', leaveRoom);
$('room-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') joinRoom();
});
</script>
</body>
</html>
