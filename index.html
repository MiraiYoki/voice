<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<link rel="stylesheet" href="https://unpkg.com/@howssatoshi/quantumcss/dist/quantum.min.css">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="语音聊天">
<link rel="apple-touch-icon" href="icon-192.png">
<title>空间语音聊天室</title>
<style>
:root {
  --bg: oklch(0.13 0.03 280);
  --bg-deeper: oklch(0.09 0.02 280);
  --card: oklch(0.17 0.025 280 / 0.7);
  --card-hover: oklch(0.20 0.03 280 / 0.85);
  --text: oklch(0.92 0 0);
  --text2: oklch(0.55 0.015 280);
  --accent: oklch(0.62 0.22 305);
  --accent-dim: oklch(0.62 0.22 305 / 0.12);
  --danger: oklch(0.55 0.22 15);
  --danger-dim: oklch(0.55 0.22 15 / 0.12);
  --border: oklch(0.25 0.02 280 / 0.6);
  --radius-sm: 10px;
  --radius: 14px;
  --radius-lg: 18px;
}
@media (prefers-color-scheme: light) {
  :root {
    --bg: oklch(0.96 0.005 280);
    --bg-deeper: oklch(0.91 0.008 280);
    --card: oklch(0.98 0.003 280 / 0.8);
    --card-hover: oklch(0.94 0.01 280);
    --text: oklch(0.15 0.01 280);
    --text2: oklch(0.45 0.01 280);
    --accent: oklch(0.5 0.2 300);
    --accent-dim: oklch(0.5 0.2 300 / 0.1);
    --danger: oklch(0.5 0.2 15);
    --danger-dim: oklch(0.5 0.2 15 / 0.1);
    --border: oklch(0.84 0.01 280);
  }
}

* { margin:0;padding:0;box-sizing:border-box; }
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
  background: var(--bg);
  background-image: radial-gradient(ellipse 70% 50% at 30% 20%, oklch(0.62 0.22 305 / 0.05) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 70% 70%, oklch(0.55 0.15 260 / 0.04) 0%, transparent 70%);
  color: var(--text); height: 100dvh; display: flex; justify-content: center;
  -webkit-font-smoothing: antialiased; overflow: hidden;
  position: fixed; top:0; left:0; right:0; bottom:0;
}
.app {
  width: 100%; max-width: 520px; height: 100%;
  display: flex; flex-direction: column; padding: 12px 14px; gap: 10px;
  background: radial-gradient(ellipse at 50% 0%, oklch(0.62 0.22 305 / 0.03), transparent 60%);
}

/* ── Header ── */
.header { text-align: center; padding: 6px 0 2px; flex-shrink: 0; }
.header h1 { font-size: 17px; font-weight: 640; letter-spacing: -0.025em; margin:0; color: var(--text); }
.header .status { font-size: 11px; color: var(--text2); margin-top: 3px; letter-spacing: 0.01em; }
.status.online { color: var(--accent); }
.status.error { color: var(--danger); }
.room-badge {
  display: inline-flex; align-items:center; gap:5px;
  background: var(--accent-dim); color: var(--accent);
  padding: 3px 11px; border-radius: 20px; font-size: 11px; font-weight: 540;
}
.room-badge .dot { width:6px; height:6px; border-radius:50%; background: var(--accent); animation: pulse-dot 2s ease-in-out infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── Map ── */
.map-wrap {
  flex:1; min-height:120px;
  background: var(--card) !important; border-radius: var(--radius) !important;
  border: 1px solid var(--border) !important; overflow: hidden; position: relative;
}
.map-wrap canvas { display:block; width:100%; height:100%; cursor:grab; }
.map-wrap canvas:active { cursor:grabbing; }
.map-hint {
  position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
  font-size:10px; color: var(--text2); opacity:.5; letter-spacing:.02em;
  pointer-events:none;
}

/* ── Joystick ── */
.joystick-wrap {
  width:100px; height:100px; border-radius:50%; flex-shrink:0;
  background: oklch(0.18 0.02 280 / 0.95);
  border: 2.5px solid oklch(0.62 0.22 305 / 0.4);
  touch-action:none; user-select:none; -webkit-user-select:none;
  display:flex; align-items:center; justify-content:center;
  position:relative;
}
.joystick-wrap::before, .joystick-wrap::after {
  content:''; position:absolute;
  background: oklch(0.35 0.02 280 / 0.5);
}
.joystick-wrap::before { width:3px; height:50px; border-radius:2px; }
.joystick-wrap::after { width:50px; height:3px; border-radius:2px; }
.joystick-wrap .stick {
  width:38px; height:38px; border-radius:50%;
  background: oklch(0.62 0.22 305 / 0.8);
  position:relative; z-index:1;
  box-shadow: 0 0 16px oklch(0.62 0.22 305 / 0.3);
  transition: transform .04s linear;
}
.joystick-wrap.active { border-color: var(--accent); box-shadow: 0 0 20px oklch(0.62 0.22 305 / 0.2); }
.joystick-wrap.active .stick { background: var(--accent); }

/* ── Self card ── */
/* self-row removed */ .x-removed- {
  background: var(--card) !important; border-radius: var(--radius) !important;
  padding: 12px 18px; display:flex; align-items:center; gap:14px;
  border: 2px solid var(--accent) !important; flex-shrink:0;
}
.self-avatar {
  width:44px; height:44px; border-radius:50%;
  background: linear-gradient(135deg, oklch(0.55 0.2 260), oklch(0.65 0.2 290));
  display:flex; align-items:center; justify-content:center;
  font-size: 18px; flex-shrink:0;
}
.self-info { flex:1; }
.self-name { font-size:15px; font-weight:620; letter-spacing:-0.01em; }
.self-mic { font-size:12px; letter-spacing:.01em; }
.self-mic.on { color: var(--accent); }
.self-mic.off { color: var(--danger); }
.ctrl-btn {
  width:44px; height:44px; border-radius:50%; border:none;
  font-size:15px; cursor:pointer; transition: transform .12s ease-out, background .2s;
  display:flex; align-items:center; justify-content:center;
}
.ctrl-btn:active { transform:scale(.92); }
.ctrl-btn.mic { background: var(--accent-dim); color: var(--accent); }
.ctrl-btn.mic.off { background: var(--danger-dim); color: var(--danger); }
.ctrl-btn.leave { background: var(--danger-dim); color: var(--danger); }

/* ── Room list panel ── */
.room-panel { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding:0 2px; }
.room-panel::-webkit-scrollbar { width:0; }
.room-panel .search-bar { display:flex; gap:6px; margin-bottom:2px; position:sticky; top:0; z-index:2; }
.room-panel .search-bar input {
  flex:1; border:1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--card); color: var(--text); padding: 10px 14px;
  font:13px system-ui, -apple-system, sans-serif; outline:none; transition: border-color .2s;
}
.room-panel .search-bar input:focus { border-color: var(--accent); }
.room-card {
  display:flex !important; align-items:center; gap:12px; padding: 14px 16px !important;
  background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
  cursor:pointer; transition: transform .15s ease-out;
}
.room-card:hover { border-color: var(--accent); transform:translateY(-1px); }
.room-card .room-icon { font-size:22px; flex-shrink:0; }
.room-card .room-info { flex:1; min-width:0; }
.room-card .room-name { font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.room-card .room-meta { font-size:11px; color: var(--text2); margin-top:2px; }
.room-card .room-count {
  font-size:12px; color: var(--accent); font-weight:640;
  background: var(--accent-dim); padding:4px 10px; border-radius:12px;
  white-space:nowrap; flex-shrink:0;
}
.room-empty { text-align:center; color: var(--text2); padding:40px 24px; font-size:13px; line-height:1.7; }

/* ── Home panel ── */
.home-panel { flex:1; display:flex; flex-direction:column; justify-content:center; padding:0 8px; }
.sub-panel { flex:1; overflow-y:auto; padding:4px 4px; }
.sub-panel::-webkit-scrollbar { width:0; }
.home-cards { display:flex; flex-direction:column; gap:16px; }
.home-card {
  display:flex; align-items:center; gap:16px;
  padding: 24px 20px;
  background: var(--card) !important;
  border: 1.5px solid var(--border) !important;
  border-radius: 20px !important;
  cursor:pointer;
  transition: border-color .2s, transform .15s, box-shadow .2s;
}
.home-card:hover { border-color: var(--accent); transform:translateY(-1px); box-shadow:0 8px 30px oklch(0.62 0.22 305 / 0.08); }
.home-card:active { transform:scale(.98); }
.home-card-ring {
  width:60px; height:60px; border-radius:50%;
  background: var(--accent-dim);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  color: var(--accent);
}
.home-card-body { flex:1; }
.home-card-title { font-size:18px; font-weight:650; letter-spacing:-.01em; margin-bottom:4px; }
.home-card-desc { font-size:13px; color: var(--text2); letter-spacing:.01em; }
.home-card-arrow { color: var(--text2); opacity:.4; flex-shrink:0; width:20px; height:20px; }

/* ── Back button ── */
.back-btn {
  padding:6px 14px; border-radius:8px; border:1px solid var(--border);
  background: var(--card); color: var(--text); font:13px system-ui;
  cursor:pointer; flex-shrink:0; transition:border-color .15s;
}
.back-btn:hover { border-color: var(--accent); }

</style>
</head>

<script>
function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:100;pointer-events:none;animation:fadeUp .3s ease-out';
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 2000);
}

// ═══════ 空间语音聊天室 ═══════
// P2P 音频 (PeerJS) + 房间发现 (MQTT) + 空间音频 (Web Audio PannerNode)
// 拖拽角色移动 → 距离衰减 → 左右声道分离

const MQTT_URL = 'wss://broker.emqx.io:8084/mqtt';
const PEER_CONFIG = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
const ROOM_SIZE = 800; // 房间尺寸 (px) — 对应虚拟空间 20m×20m
const POS_INTERVAL = 0; // 位置广播间隔 (0=每帧)
const COLORS = ['#4f46e5','#7c3aed','#db2777','#ea580c','#16a34a','#0891b2','#ca8a04',
  '#9333ea','#e11d48','#65a30d','#0d9488','#b45309','#1d4ed8','#2563eb'];

let peer = null, mqttClient = null, localStream = null;
let registryMqtt = null; // 房间注册表MQTT (常驻)
let audioCtx = null;
let micOn = true, myPeerId = null, currentRoom = null;
let isRoomCreator = false;
const peers = new Map();
const roomList = new Map(); // name → {hasPassword, memberCount}

// ═══════ MQTT 房间注册表 (常驻连接) ═══════
function connectRegistry() {
  registryMqtt = mqtt.connect(MQTT_URL, { clean: true, connectTimeout: 8000, reconnectPeriod: 3000 });
  registryMqtt.on('connect', () => {
    registryMqtt.subscribe('voice-registry/#');
  });
  registryMqtt.on('message', (topic, msg) => {
    if (topic === 'voice-registry/__heartbeat') return;
    const name = topic.replace('voice-registry/', '');
    if (!msg.toString()) {
      roomList.delete(name); // 空消息=删除
      if (name === currentRoom) { leaveRoom(); showToast('房间已被销毁'); }
    } else {
      try { roomList.set(name, JSON.parse(msg.toString())); } catch(e) {}
    }
    renderRoomList();
  });
}

function renderRoomList() {
  const search = ($('room-search').value || '').toLowerCase();
  const container = $('room-list');
  const empty = $('room-empty');
  const rooms = [...roomList.entries()].filter(([n]) => n.toLowerCase().includes(search));
  if (rooms.length === 0) {
    empty.style.display = ''; container.innerHTML = '';
    empty.textContent = search ? '没有匹配的房间' : '还没有房间 · 创建一个吧';
  } else {
    empty.style.display = 'none';
    lucide.createIcons();
    container.innerHTML = rooms.map(([n, r]) =>
      `<div class="room-card" onclick="clickRoom('${n}', ${r.hasPassword || false})">
        <div class="room-icon"><i data-lucide="${r.hasPassword ? 'lock' : 'globe'}" style="width:20px;height:20px"></i></div>
        <div class="room-info"><div class="room-name">${n}</div><div class="room-meta">${r.hasPassword ? '需要密码' : '公开房间'}</div></div>
        <div class="room-count">${r.memberCount || 0}人</div>
      </div>`).join('');
  }
}

function clickRoom(name, hasPassword) {
  $('room-input').value = name;
  $('room-pw').value = '';
  if (hasPassword) {
    // 提示输入密码
    const pw = prompt('请输入房间密码');
    if (pw === null) return; // 取消
    $('room-pw').value = pw;
  }
  joinRoom(false);
}

function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h + str.charCodeAt(i)) | 0; }
  return Math.abs(h).toString(36);
}

$('room-search').addEventListener('input', renderRoomList);

// ═══════ Canvas 地图 ═══════
const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
let myPos = { x: ROOM_SIZE/2, y: ROOM_SIZE/2 };
let dragging = false, dragTarget = null;

function resizeCanvas() {
  const wrap = document.getElementById('map-wrap');
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resizeCanvas();
// drawMap() called below after pingRipple declaration
window.addEventListener('resize', () => { resizeCanvas(); drawMap(); });

function pxToWorld(cx, cy) {
  return {
    x: (cx / canvas.width * devicePixelRatio) * ROOM_SIZE,
    y: (cy / canvas.height * devicePixelRatio) * ROOM_SIZE
  };
}

let pingRipple = null;
// ── 摄像头系统 + 背景图 ──
const mapImage = new Image();
mapImage.src = 'map-bg.jpg';
let worldW = 1600, worldH = 1200, cameraX = 0, cameraY = 0;
mapImage.onload = () => { worldW = mapImage.naturalWidth; worldH = mapImage.naturalHeight; drawMap(); };
function updateCamera() {
  const vw = canvas.width / devicePixelRatio, vh = canvas.height / devicePixelRatio;
  const px = (myPos.x / ROOM_SIZE) * worldW, py = (myPos.y / ROOM_SIZE) * worldH;
  cameraX = Math.max(0, Math.min(worldW - vw, px - vw / 2));
  cameraY = Math.max(0, Math.min(worldH - vh, py - vh / 2));
}
function worldToScreen(wx, wy) { return { x: wx - cameraX, y: wy - cameraY }; }
function screenToWorld(sx, sy) { return { x: sx + cameraX, y: sy + cameraY }; }

drawMap();  // 初始空房间

function drawMap() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  // 背景大图 + 摄像头
  if (mapImage.complete && worldW > 0) {
    updateCamera();
    ctx.drawImage(mapImage, cameraX, cameraY, w, h, 0, 0, w, h);
  } else {
    ctx.fillStyle = '#111'; ctx.fillRect(0, 0, w, h);
  }
  // 网格
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gs = 40;
  for (let x = gs; x < w; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = gs; y < h; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

  // 其他人 (世界坐标→屏幕)
  for (const [pid, p] of peers) {
    const wx = (p.x / ROOM_SIZE) * worldW, wy = (p.y / ROOM_SIZE) * worldH;
    const s = worldToScreen(wx, wy);
    drawAvatar(s.x, s.y, p.color || '#888', pid.slice(-6), false);
  }

  // 自己
  const mx = (myPos.x / ROOM_SIZE) * worldW, my = (myPos.y / ROOM_SIZE) * worldH;
  const ms = worldToScreen(mx, my);
  drawAvatar(ms.x, ms.y, '#22c55e', '我', true);

  // Ping 波纹
  if (pingRipple) {
    const now = Date.now();
    const elapsed = (now - pingRipple.t) / 1000;
    if (elapsed < 1.2) {
      const r = 14 + elapsed * 60;
      const alpha = 1 - elapsed / 1.2;
      ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(pingRipple.x, pingRipple.y, r, 0, Math.PI * 2); ctx.stroke();
      requestAnimationFrame(() => { drawMap(); });
    } else {
      pingRipple = null;
    }
  }
}

function drawAvatar(x, y, color, label, isSelf) {
  const r = isSelf ? 15 : 13;
  // 光晕
  const glow = ctx.createRadialGradient(x, y, r * 0.5, x, y, r * 2);
  glow.addColorStop(0, color + '40');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(x, y, r * 2, 0, Math.PI * 2); ctx.fill();
  // 身体
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  // 标签
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(label, x, y - r - 8);
}

function findClosestPeer(mx, my) {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  let best = null, bestDist = 30; // 30px 内才算点中
  for (const [pid, p] of peers) {
    const px = (p.x / ROOM_SIZE) * w;
    const py = (p.y / ROOM_SIZE) * h;
    const dist = Math.hypot(mx - px, my - py);
    if (dist < bestDist) { bestDist = dist; best = pid; }
  }
  for (const s of simSpeakers) {
    const px = (s.x / ROOM_SIZE) * w; const py = (s.y / ROOM_SIZE) * h;
    const dist = Math.hypot(mx - px, my - py);
    if (dist < bestDist) { bestDist = dist; best = s.id; }
  }
  return best;
}

// ── 拖拽/触摸 ──
canvas.addEventListener('pointerdown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const target = findClosestPeer(mx, my);
  if (target && target.startsWith('sim-')) {
    toggleSimSpeaker(target); drawMap(); return;
  }
  if (target === null) {
    // 点空地 → 移动自己
    dragging = true; dragTarget = 'self';
    const pos = pxToWorld(mx, my);
    myPos.x = Math.max(10, Math.min(ROOM_SIZE - 10, pos.x));
    myPos.y = Math.max(10, Math.min(ROOM_SIZE - 10, pos.y));
    broadcastPosition();
    updateSpatialAudio();
    drawMap();
  } else if (e.detail === 2) {
    // 双击别人 → ping
    const p = peers.get(target);
    const w = canvas.width / devicePixelRatio;
    const px = (p.x / ROOM_SIZE) * w;
    const py = (p.y / ROOM_SIZE) * h;
    pingRipple = { x: px, y: py, t: Date.now() };
    drawMap();
    // 发送 ping
    mqttClient.publish('voice-room/' + currentRoom + '/ping', JSON.stringify({
      from: myPeerId, to: target
    }));
  }
});
canvas.addEventListener('pointermove', (e) => {
  if (!dragging || dragTarget !== 'self') return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const pos = pxToWorld(mx, my);
  myPos.x = Math.max(10, Math.min(ROOM_SIZE - 10, pos.x));
  myPos.y = Math.max(10, Math.min(ROOM_SIZE - 10, pos.y));
  broadcastPosition();
  updateSpatialAudio();
  drawMap();
});
canvas.addEventListener('pointerup', () => { dragging = false; dragTarget = null; });
canvas.addEventListener('pointerleave', () => { dragging = false; dragTarget = null; });

// 键盘 WASD
// ── 虚拟摇杆 ──
const joystick = $('joystick'), joystickStick = $('joystick-stick');
let joystickActive = false, joystickDX = 0, joystickDY = 0, joystickRAF = null;
const JOYSTICK_RADIUS = 36; // 摇杆最大偏移像素

function startJoystick(e) {
  if (!currentRoom) return;
  joystickActive = true; joystick.classList.add('active');
  updateJoystick(e);
}
function moveJoystick(e) { if (joystickActive) updateJoystick(e); }
function stopJoystick() {
  joystickActive = false; joystick.classList.remove('active');
  joystickStick.style.transform = 'translate(0,0)';
  joystickDX = joystickDY = 0;
}

function updateJoystick(e) {
  const rect = joystick.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  const px = (e.touches ? e.touches[0].clientX : e.clientX) - cx;
  const py = (e.touches ? e.touches[0].clientY : e.clientY) - cy;
  const dist = Math.hypot(px, py);
  const clamp = Math.min(dist, JOYSTICK_RADIUS);
  const nx = dist > 0 ? (px / dist) * clamp : 0;
  const ny = dist > 0 ? (py / dist) * clamp : 0;
  joystickStick.style.transform = `translate(${nx}px,${ny}px)`;
  joystickDX = nx / JOYSTICK_RADIUS; // -1..1
  joystickDY = ny / JOYSTICK_RADIUS;
}

function joystickLoop() {
  if (!joystickActive || Math.abs(joystickDX) < 0.05 && Math.abs(joystickDY) < 0.05) {
    joystickRAF = requestAnimationFrame(joystickLoop);
    return;
  }
  const speed = 4; // 每帧移动像素
  myPos.x += joystickDX * speed;
  myPos.y += joystickDY * speed;
  // 相机跟随但允许玩家超出视野
  myPos.x = Math.max(0, Math.min(ROOM_SIZE, myPos.x));
  myPos.y = Math.max(0, Math.min(ROOM_SIZE, myPos.y));
  broadcastPosition();
  updateSpatialAudio();
  drawMap();
  joystickRAF = requestAnimationFrame(joystickLoop);
}
joystickLoop();

joystick.addEventListener('pointerdown', startJoystick);
joystick.addEventListener('pointermove', moveJoystick);
joystick.addEventListener('pointerup', stopJoystick);
joystick.addEventListener('pointerleave', stopJoystick);

document.addEventListener('keydown', (e) => {
  if (!currentRoom) return;
  const step = 20;
  switch (e.key.toLowerCase()) {
    case 'w': case 'arrowup': myPos.y -= step; break;
    case 's': case 'arrowdown': myPos.y += step; break;
    case 'a': case 'arrowleft': myPos.x -= step; break;
    case 'd': case 'arrowright': myPos.x += step; break;
    default: return;
  }
  myPos.x = Math.max(10, Math.min(ROOM_SIZE - 10, myPos.x));
  myPos.y = Math.max(10, Math.min(ROOM_SIZE - 10, myPos.y));
  broadcastPosition();
  updateSpatialAudio();
  drawMap();
});

let lastPosBroadcast = 0;
function broadcastPosition() {
  const now = Date.now();
  if (now - lastPosBroadcast < POS_INTERVAL) return;
  lastPosBroadcast = now;
  if (mqttClient && currentRoom) {
    mqttClient.publish('voice-room/' + currentRoom + '/pos', JSON.stringify({
      peerId: myPeerId, x: myPos.x, y: myPos.y
    }));
  }
}

// ═══════ 空间音频 + 避让 ═══════
let duckingOn = true;
const DUCK_RATIO = 0.3;

// ═══════ 音频文件加载 + 空间播放 ═══════
const simSpeakers = []; // { id, buffer, source, gain, panner, stereoPan, x, y, on, name, looping }
let simActive = false, simNextId = 0;

function toggleSimMode() {
  if (!audioCtx) { showToast('请先加入房间'); return; }
  simActive = !simActive;
  $('btn-sim').classList.toggle('active', simActive);
  if (simActive) {
    loadPresetAudio();
  } else {
    removeAllSimSpeakers();
    showToast('音频源已清除');
  }
  drawMap();
}

async function loadPresetAudio() {
  // 剧本杀争吵场景 — 6个角色互相指控
  const presets = [
    { x: ROOM_SIZE*0.15, y: ROOM_SIZE*0.2, url: 'audio/t1.m4a', name: '张老板' },
    { x: ROOM_SIZE*0.85, y: ROOM_SIZE*0.2, url: 'audio/t2.m4a', name: '李小姐' },
    { x: ROOM_SIZE*0.5,  y: ROOM_SIZE*0.4, url: 'audio/t3.m4a', name: '王管家' },
    { x: ROOM_SIZE*0.2,  y: ROOM_SIZE*0.7, url: 'audio/t4.m4a', name: '赵医生' },
    { x: ROOM_SIZE*0.8,  y: ROOM_SIZE*0.7, url: 'audio/t5.m4a', name: '孙少奶奶' },
    { x: ROOM_SIZE*0.5,  y: ROOM_SIZE*0.85, url: 'audio/t6.m4a', name: '陈捕头' },
  ];
  for (const p of presets) {
    try {
      const resp = await fetch(p.url);
      const buf = await resp.arrayBuffer();
      const audioBuf = await audioCtx.decodeAudioData(buf);
      const id = 'sim-' + (simNextId++);
      addSimSpeaker(id, p.x, p.y, audioBuf, p.name);
    } catch(e) { console.error('load preset', p.name, e); }
  }
  showToast('6个真人语音声源已放置 · 点击开关');
  drawMap();
}

function loadSimAudio(file) {
  if (!audioCtx) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    audioCtx.decodeAudioData(e.target.result, (buffer) => {
      const id = 'sim-' + (simNextId++);
      const sx = 100 + Math.random() * (ROOM_SIZE - 200);
      const sy = 150 + Math.random() * 400;
      addSimSpeaker(id, sx, sy, buffer, file.name.replace(/\.[^.]+$/, ''));
    }, () => { showToast('无法解码: ' + file.name); });
  };
  reader.readAsArrayBuffer(file);
}

function addSimSpeaker(id, x, y, buffer, name) {
  const gain = audioCtx.createGain();
  const stereoPan = audioCtx.createStereoPanner();
  const panner = audioCtx.createPanner();
  panner.panningModel = 'HRTF';
  panner.distanceModel = 'inverse';
  panner.refDistance = 2; panner.maxDistance = 18; panner.rolloffFactor = 1.5;
  gain.gain.value = 0.7;
  gain.connect(stereoPan);
  stereoPan.connect(panner);
  panner.connect(audioCtx.destination);
  const source = audioCtx.createBufferSource();
  source.buffer = buffer; source.loop = true;
  source.connect(gain);
  source.start();
  const s = { id, buffer, source, gain, panner, stereoPan, x, y, on: true, name, looping: true };
  simSpeakers.push(s);
  updateSimSpatial(s);
  drawMap();
}

function removeAllSimSpeakers() {
  for (const s of simSpeakers) {
    try { s.osc?.stop(); s.osc?.disconnect(); } catch(e) {}
    try { s.mod?.stop(); s.mod?.disconnect(); } catch(e) {}
    try { s.modGain?.disconnect(); } catch(e) {}
    try { s.source?.stop(); s.source?.disconnect(); } catch(e) {}
    try { s.gain?.disconnect(); s.stereoPan?.disconnect(); s.panner?.disconnect(); } catch(e) {}
  }
  simSpeakers.length = 0;
}

function updateSimSpatial(s) {
  if (!audioCtx) return;
  const sx = (myPos.x / ROOM_SIZE) * 20 - 10;
  const sz = (myPos.y / ROOM_SIZE) * 20 - 10;
  const tx = (s.x / ROOM_SIZE) * 20 - 10;
  const tz = (s.y / ROOM_SIZE) * 20 - 10;
  if (s.panner.positionX) {
    s.panner.positionX.value = tx; s.panner.positionZ.value = tz;
  } else {
    s.panner.setPosition(tx, 0, tz);
  }
  const dx = tx - sx, dz = tz - sz;
  s.stereoPan.pan.value = Math.tanh(Math.atan2(dx, Math.abs(dz) + 0.01) * 2);
}

function toggleSimSpeaker(id) {
  const s = simSpeakers.find(p => p.id === id);
  if (!s) return;
  s.on = !s.on;
  s.gain.gain.value = s.on ? 0.7 : 0;
}

// ── 自动避让 (Ducking) ──
let duckTimer = null;
function startDucking() {
  if (duckTimer) return;
  duckTimer = setInterval(() => {
    if (!duckingOn) return;
    let loudest = null, loudestVol = 0;
    // 找最响的人
    for (const [pid, p] of peers) {
      const vol = p.smoothedVol || 0;
      if (vol > loudestVol) { loudestVol = vol; loudest = p; }
    }
    // 最响的人满音量, 其余人压到 DUCK_RATIO
    for (const [pid, p] of peers) {
      if (!p.gainNode) continue;
      const target = (p === loudest && loudestVol > 10) ? 1.0 : DUCK_RATIO;
      // 平滑过渡避免爆音
      const cur = p.gainNode.gain.value;
      p.gainNode.gain.value = cur + (target - cur) * 0.2;
    }
  }, 100);
}
function stopDucking() {
  if (duckTimer) { clearInterval(duckTimer); duckTimer = null; }
}

function updateSpatialAudio() {
  if (!audioCtx) return;
  // 更新模拟声源
  for (const s of simSpeakers) { if (s.on) updateSimSpatial(s); }
  const listener = audioCtx.listener;
  const sx = (myPos.x / ROOM_SIZE) * 20 - 10;
  const sz = (myPos.y / ROOM_SIZE) * 20 - 10;
  if (listener.positionX) { listener.positionX.value = sx; listener.positionZ.value = sz; }
  else { listener.setPosition(sx, 0, sz); }

  for (const [pid, p] of peers) {
    if (!p.panner) continue;
    const tx = (p.x / ROOM_SIZE) * 20 - 10;
    const tz = (p.y / ROOM_SIZE) * 20 - 10;
    if (p.panner.positionX) { p.panner.positionX.value = tx; p.panner.positionZ.value = tz; }
    else { p.panner.setPosition(tx, 0, tz); }
  }
}

let posTimer = null;

// ═══════ 加入/离开 ═══════
async function joinRoom(isCreate) {
  const roomName = $('room-input').value.trim();
  const pw = $('room-pw').value.trim();
  if (!roomName || currentRoom) return;

  // 密码处理: 实际MQTT话题 = hash(房间名+密码)
  const hasPassword = pw.length > 0;
  const actualRoom = hasPassword ? roomName + '-' + simpleHash(roomName + ':' + pw) : roomName;

  // 如果是加入已有房间，检查是否先要在注册表中存在
  if (!isCreate && hasPassword && !roomList.has(roomName)) {
    showToast('房间不存在或密码错误'); return;
  }

  currentRoom = roomName;
  isRoomCreator = isCreate;
  ['home-panel','room-panel','profile-panel','create-panel'].forEach(id => { if($(id)) $(id).style.display = 'none'; });
  $('map-wrap').style.display = '';
  $('joystick').style.display = '';
  resizeCanvas(); drawMap();
  $('room-search').value = '';
  renderRoomList();

  setStatus('正在连接...');
  $('btn-create-room').disabled = true;

  // 重置音频会话到默认 (清除上次遗留的 playback-only 状态)
  if (navigator.audioSession) { navigator.audioSession.type = 'auto'; }
  await new Promise(r => setTimeout(r, 100));

  // 先创建 AudioContext (音乐模式, 抢占蓝牙 A2DP)
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  // 再获取麦克风 (通话模式 HFP)
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    setStatus('麦克风权限被拒绝', true);
    $('btn-create-room').disabled = false; currentRoom = null;
    return;
  }
  if (navigator.audioSession) { navigator.audioSession.type = 'play-and-record'; }

  micOn = true;
  updateMicUI(true);

  // MQTT 房间发现
  const room = actualRoom;
  mqttClient = mqtt.connect(MQTT_URL, { clean: true, connectTimeout: 8000, reconnectPeriod: 0 });
  mqttClient.on('connect', () => {
    mqttClient.subscribe('voice-room/' + room + '/#');
  });
  mqttClient.on('error', (e) => { console.error('MQTT error', e); setStatus('信令不可达 · 刷新重试', true); });

  // 发布到注册表
  if (isCreate) {
    registryMqtt.publish('voice-registry/' + roomName, JSON.stringify({
      hasPassword, memberCount: 1
    }), { retain: true });
  }

  // PeerJS
  const peerId = 'vr-' + room + '-' + Math.random().toString(36).slice(2, 8);
  myPeerId = peerId;
  peer = new Peer(peerId, { config: PEER_CONFIG });

  peer.on('open', () => {
    showSelf(roomName);
    setStatus('', false, true, roomName);
    startDucking();
    mqttClient.publish('voice-room/' + room + '/announce', JSON.stringify({
      peerId, x: myPos.x, y: myPos.y
    }));
    // 定时广播位置
    posTimer = setInterval(broadcastPosition, POS_INTERVAL);
  });

  peer.on('error', (e) => { setStatus('连接失败: ' + e.type, true); leaveRoom(); });

  peer.on('call', (call) => {
    call.answer(getActiveStream());
    setupCall(call);
  });

  // 收到他人的 announcement → 回拨
  mqttClient.on('message', (topic, msg) => {
    const parts = topic.split('/');
    const type = parts[parts.length - 1];
    if (type === 'announce') {
      const data = JSON.parse(msg.toString());
      if (data.peerId === myPeerId) return;
      if (!data.x) data.x = ROOM_SIZE/2; if (!data.y) data.y = ROOM_SIZE/2;
      // 如果已有这个 peer（呼叫先于 announce 到达）→ 只更新位置
      if (peers.has(data.peerId)) {
        const p = peers.get(data.peerId);
        p.x = data.x; p.y = data.y;
        updateSpatialAudio(); drawMap();
        return;
      }
      // 新 peer → 呼叫 + 存储
      const call = peer.call(data.peerId, getActiveStream());
      const info = {};
      info.x = data.x; info.y = data.y;
      peers.set(data.peerId, info);
      setupCall(call);
      updateRoomCount(); drawMap();
    } else if (type === 'pos') {
      const data = JSON.parse(msg.toString());
      const p = peers.get(data.peerId);
      if (p) { p.x = data.x; p.y = data.y; updateSpatialAudio(); drawMap(); }
    } else if (type === 'ping') {
      const data = JSON.parse(msg.toString());
      if (data.to === myPeerId) {
        const p = peers.get(data.from);
        if (p) {
          const w = canvas.width / devicePixelRatio;
          const px = (p.x / ROOM_SIZE) * w;
          const py = (p.y / ROOM_SIZE) * h;
          pingRipple = { x: px, y: py, t: Date.now() };
          drawMap();
        }
      }
    }
  });

  // 初始随机位置
  myPos.x = 100 + Math.random() * (ROOM_SIZE - 200);
  myPos.y = 100 + Math.random() * (ROOM_SIZE - 200);
  drawMap();
}

function setupCall(call) {
  const pid = call.peer;
  if (peers.has(pid)) {
    if (peers.get(pid).stream) return; // 已经 setup 过了
  }

  const info = peers.get(pid) || { x: ROOM_SIZE/2, y: ROOM_SIZE/2 };
  info.call = call;
  info.color = COLORS[peers.size % COLORS.length];

  call.on('stream', (remoteStream) => {
    // 空间音频链路: stream → source → panner → destination
    const source = audioCtx.createMediaStreamSource(remoteStream);
    const stereoPan = audioCtx.createStereoPanner();
    const panner = audioCtx.createPanner();
    const gainNode = audioCtx.createGain();
    panner.panningModel = 'HRTF';
    panner.distanceModel = 'inverse';
    panner.refDistance = 2;
    panner.maxDistance = 18;
    panner.rolloffFactor = 1.5;
    // 链路: source → stereoPan → panner → gainNode → destination
    source.connect(stereoPan);
    stereoPan.connect(panner);
    panner.connect(gainNode);
    // gainNode → volAnalyser → destination (加一路分析器)
    const volAnalyser = audioCtx.createAnalyser();
    volAnalyser.fftSize = 256;
    gainNode.connect(volAnalyser);
    volAnalyser.connect(audioCtx.destination);

    info.stream = remoteStream;
    info.source = source;
    info.stereoPan = stereoPan;
    info.panner = panner;
    info.gainNode = gainNode;
    info.smoothedVol = 0;
    info._volBuf = new Uint8Array(volAnalyser.frequencyBinCount);
    const volTick = () => {
      if (!peers.has(pid)) return;
      volAnalyser.getByteFrequencyData(info._volBuf);
      const avg = info._volBuf.reduce((a,b)=>a+b,0) / info._volBuf.length;
      info.smoothedVol = info.smoothedVol * 0.6 + avg * 0.4;
      requestAnimationFrame(volTick);
    };
    volTick();
    peers.set(pid, info);
    updateSpatialAudio();
    drawMap();
  });

  call.on('close', () => removePeer(pid));
  call.on('error', () => removePeer(pid));
  peers.set(pid, info);
}

function removePeer(pid) {
  const p = peers.get(pid);
  if (p) {
    try { p.source?.disconnect(); } catch(e) {}
    try { p.stereoPan?.disconnect(); } catch(e) {}
    try { p.panner?.disconnect(); } catch(e) {}
    try { p.gainNode?.disconnect(); } catch(e) {}
    try { p.call?.close(); } catch(e) {}
    peers.delete(pid);
  }
  updateRoomCount(); drawMap();
}

// ── 替换所有 PeerJS 连接中的送出音频轨 ──
function replaceSenderTracks(track) {
  for (const [pid, p] of peers) {
    if (p.call && p.call.peerConnection) {
      p.call.peerConnection.getSenders().forEach(s => {
        if (s.track?.kind === 'audio') { try { s.replaceTrack(track); } catch(e) {} }
      });
    }
  }
}

// ── 销毁旧 AudioContext, 用远端流重建全部接收链路 ──
async function rebuildAudio() {
  if (audioCtx) { try { await audioCtx.close(); } catch(e) {} }
  audioCtx = new AudioContext();
  await audioCtx.resume();
  let rebuilt = 0, skipped = 0;
  for (const [pid, p] of peers) {
    if (!p.stream) { skipped++; continue; }
    try { p.source?.disconnect(); p.stereoPan?.disconnect(); p.panner?.disconnect(); p.gainNode?.disconnect(); } catch(e) {}
    p.source = audioCtx.createMediaStreamSource(p.stream);
    p.stereoPan = audioCtx.createStereoPanner();
    p.panner = audioCtx.createPanner();
    p.gainNode = audioCtx.createGain();
    p.panner.panningModel = 'HRTF';
    p.panner.distanceModel = 'inverse';
    p.panner.refDistance = 2; p.panner.maxDistance = 18; p.panner.rolloffFactor = 1.5;
    p.source.connect(p.stereoPan);
    p.stereoPan.connect(p.panner);
    p.panner.connect(p.gainNode);
    const volA = audioCtx.createAnalyser();
    volA.fftSize = 256;
    p.gainNode.connect(volA);
    volA.connect(audioCtx.destination);
    p._volBuf = new Uint8Array(volA.frequencyBinCount);
    const tick = () => {
      if (!peers.has(pid)) return;
      volA.getByteFrequencyData(p._volBuf);
      const avg = p._volBuf.reduce((a,b)=>a+b,0) / p._volBuf.length;
      p.smoothedVol = p.smoothedVol * 0.6 + avg * 0.4;
      requestAnimationFrame(tick);
    };
    tick();
  }
  console.log('rebuildAudio: rebuilt=' + rebuilt + ' skipped=' + skipped + ' peers.size=' + peers.size);
  updateSpatialAudio();
}

// ── 推讲: 关麦立体声蓝牙 ⇄ 开麦单声道蓝牙 ──
let micBusy = false;
async function toggleMic() {
  console.log('toggleMic called, micBusy=', micBusy, 'localStream=', !!localStream);
  if (micBusy) return;
  micBusy = true;
  try {
  if (localStream) {
    // 关麦: 释放 getUserMedia → 重建 AudioContext (音乐模式 → 立体声 A2DP)
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
    if (navigator.audioSession) { navigator.audioSession.type = 'playback'; }
    await rebuildAudio();
    updateMicUI(false);
  } else {
    // 开麦: 先重置音频会话 → getUserMedia → 切通话模式
    if (navigator.audioSession) { navigator.audioSession.type = 'auto'; }
    if (audioCtx) { await audioCtx.close(); audioCtx = null; }
    await new Promise(r => setTimeout(r, 150));
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    if (navigator.audioSession) { navigator.audioSession.type = 'play-and-record'; }
    await rebuildAudio();
    replaceSenderTracks(localStream.getAudioTracks()[0]);
    updateMicUI(true);
  }
  } catch(e) { console.error('toggleMic error', e); showToast('麦克风切换失败'); }
    finally { micBusy = false; }
}

function updateMicUI(on) {
  const btn = $('btn-mic'), label = $('self-mic');
  btn.classList.toggle('off', !on);
  btn.innerHTML = on ? '<i data-lucide="mic" style="width:18px;height:18px"></i>' : '<i data-lucide="mic-off" style="width:18px;height:18px"></i>';
  label.className = 'self-mic ' + (on ? 'on' : 'off');
  label.textContent = on ? '发言中 · 单声道' : '收听中 · 立体声';
  lucide.createIcons();
}

function updateRoomCount() {
  if (!currentRoom) return;
  const count = peers.size + 1;
  const el = $('status');
  const badge = el.querySelector('.room-badge');
  if (badge) {
    badge.innerHTML = '<span class="dot"></span>' + currentRoom + ' · ' + count + '人';
  }
  // 更新注册表人数
  const info = roomList.get(currentRoom);
  if (isRoomCreator) {
    registryMqtt.publish('voice-registry/' + currentRoom, JSON.stringify({
      hasPassword: info?.hasPassword || false, memberCount: count
    }), { retain: true });
  }
}

function setStatus(text, isError, isOnline, room) {
  const el = $('status');
  el.className = 'status' + (isError ? ' error' : '') + (isOnline ? ' online' : '');
  if (room) {
    const count = peers.size + 1; // +1 = 自己
    el.innerHTML = '<span class="room-badge"><span class="dot"></span>' + room + ' · ' + count + '人</span> ' + text;
  } else {
    el.textContent = text;
  }
}

function leaveRoom() {
  for (const [, p] of peers) {
    try { p.source?.disconnect(); } catch(e) {}
    try { p.stereoPan?.disconnect(); } catch(e) {}
    try { p.panner?.disconnect(); } catch(e) {}
    try { p.gainNode?.disconnect(); } catch(e) {}
    try { p.call?.close(); } catch(e) {}
  }
  peers.clear();
  if (peer) { peer.destroy(); peer = null; }
  if (mqttClient) { try { mqttClient.end(); } catch(e) {} mqttClient = null; }
  removeAllSimSpeakers(); simActive = false;
  stopDucking();
  if (posTimer) { clearInterval(posTimer); posTimer = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  if (audioCtx) { audioCtx.close(); audioCtx = null; }
  // 清空注册表 (如果房间只剩自己)
  const countBefore = peers.size + 1;
  if (isRoomCreator && countBefore <= 1) {
    registryMqtt.publish('voice-registry/' + currentRoom, '', { retain: true });
  }
  isRoomCreator = false;

  myPeerId = null; currentRoom = null; micOn = true; myPos = { x: ROOM_SIZE/2, y: ROOM_SIZE/2 };

  $('game-bar').style.display = 'none';
  $('home-panel').style.display = '';
  ['room-panel','profile-panel','create-panel','map-wrap'].forEach(id => { if($(id)) $(id).style.display = 'none'; });
  // joystick inside game-bar, hidden with game-bar
  $('self-name').textContent = '我';
  $('self-mic').className = 'self-mic on'; $('self-mic').textContent = '麦克风已开启';
  $('btn-mic').classList.remove('off'); $('btn-mic').innerHTML = '<i data-lucide="mic" style="width:18px;height:18px"></i>'; lucide.createIcons();
  $('btn-create-room').disabled = false;
  setStatus('输入房间名加入');
  drawMap();
}

$('avatar-upload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    const size = Math.min(img.width, img.height);
    c.width = c.height = 200;
    const ctx = c.getContext('2d');
    ctx.beginPath(); ctx.arc(100, 100, 100, 0, Math.PI * 2); ctx.clip();
    ctx.drawImage(img, (img.width - size) / 2, (img.height - size) / 2, size, size, 0, 0, 200, 200);
    profileAvatar = c.toDataURL();
    localStorage.setItem('voice-profile-avatar', profileAvatar);
    updateProfileUI();
  };
  img.src = URL.createObjectURL(file);
});
$('profile-name').addEventListener('input', (e) => {
  profileName = e.target.value.trim();
  localStorage.setItem('voice-profile-name', profileName);
  updateProfileUI();
});
